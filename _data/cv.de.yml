interests:
  - name: Zuverlaessige agentische LLMs
    short: Gedaechtnis, Sicherheit und Systemverhalten fuer langfristig laufende agentische KI.
    body: Ich arbeite an Langzeitgedaechtnis, zerfallsgetriebener Aktivierung und skalierbaren LLM-Systemen fuer reale Einsatzbedingungen.
  - name: Interpretierbarkeit von KI
    short: Prototypenbasierte Erklaerungen, kausale Mechanismen und transparentes Modellverhalten.
    body: Ich entwickle interpretierbare Systeme rund um Classification-by-Components, GLVQ/GTLVQ und prototypenspezifische Erklaerungen.
  - name: Multimodales Repraesentationslernen
    short: Nuetzliche Repraesentationen ueber Sprache, Vision, Zeitreihen und strukturierte Signale hinweg.
    body: Meine Erfahrung umfasst CT-Bildanalyse, Zeitreihen-Transformer, Punktwolkensegmentierung, Information Retrieval und wissenschaftliche Claim-Verifikation.
