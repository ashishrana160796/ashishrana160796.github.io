intro:
  eyebrow: Ueberblick
  title: Interessiert an Forschung und Engineering
  headline: Ich entwickle interpretierbare, zuverlaessige KI-Systeme mit Forschungstiefe und Produktionsdisziplin.
  body: >
    Ich arbeite an agentischen LLMs, prototypenbasierter erklaerbarer KI, multimodalem Lernen und
    skalierbaren Machine-Learning-Systemen. Meine aktuelle Forschungsrichtung verbindet Langzeitgedaechtnis
    in agentischen LLMs, kausale Prototyp-Mechanismus-Erklaerungen und produktionsnahes LLM-Systemdesign.
  ctas:
    - label: Publikationen ansehen
      url: "#publications"
    - label: Zusammenarbeit starten
      url: "#contact"
profile:
  heading: Forschungsprofil
  body: >
    Mein Forschungsinteresse liegt bei XAI, LLM-Systemen, prototypenbasierten Erklaerungen und agentischem
    Gedaechtnis. Auf der Engineering-Seite interessieren mich reproduzierbare ML-Pipelines, vollstaendig
    deployte Software mit Backend- und CI/CD-Disziplin sowie KI-Softwarepakete, die praktisch und verlaesslich
    nutzbar sind.
