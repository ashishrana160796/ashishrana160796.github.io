interests:
  - name: Reliable Agentic LLMs
    short: Memory, safety, and system behavior for long-running agentic AI.
    body: I work on long-term memory, decay-driven activation, and scalable LLM systems that remain useful under real operational constraints.
  - name: AI Interpretability
    short: Prototype-based explanations, causal mechanisms, and transparent model behavior.
    body: I build interpretable systems around Classification-by-Components, GLVQ/GTLVQ, and prototype-specific explanations for high-stakes domains.
  - name: Multimodal Representation Learning
    short: Learning useful representations across language, vision, time-series, and structured signals.
    body: My experience spans CT image analysis, time-series transformers, point-cloud segmentation, information retrieval, and scientific claim verification.
