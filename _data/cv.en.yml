intro:
  eyebrow: Overview
  title: Interested in Research and Engineering
  headline: Building interpretable, reliable AI systems with research depth and production discipline.
  body: >
    I work across agentic LLMs, prototype-based explainable AI, multimodal learning, and scalable
    machine learning systems. My current research direction connects long-term memory in agentic LLMs,
    causal prototype-mechanism explanations, and production-minded LLM system design.
  ctas:
    - label: View Publications
      url: "#publications"
    - label: Start Collaboration
      url: "#contact"
profile:
  heading: Research profile
  body: >
    My research taste is centered on XAI, LLM systems, prototype-based explanations, and agentic memory.
    On the engineering side, I care about reproducible ML pipelines, complete deployed software with
    backend and CI/CD discipline, and AI software packages that are practical enough to run more than once.
research_interests:
