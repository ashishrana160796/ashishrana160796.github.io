<div class="site-controls" aria-label="Site controls">
  <div class="control-group language-switch" role="group" aria-label="Language">
    <button type="button" class="control-button is-active" data-lang-switch="en">EN</button>
    <button type="button" class="control-button" data-lang-switch="de">DE</button>
  </div>
  <button type="button" class="control-button theme-toggle" data-theme-toggle aria-label="Toggle color theme">
    <span data-theme-icon>☼</span>
  </button>
</div>
