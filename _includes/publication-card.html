<button type="button" class="publication-card" data-publication-target="{{ include.paper.id }}">
  <span class="paper-year">{{ include.paper.year }}</span>
  <strong>{{ include.paper.title }}</strong>
  <em>{{ include.paper.venue }}</em>
  <span class="paper-status">{{ include.paper.status_or_award }}</span>
</button>
